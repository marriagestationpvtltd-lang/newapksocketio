<!DOCTYPE html>
<html>
<head>
  <base href="/adminp/">
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Panel">
  <title>Marriage Station – Admin</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body { margin: 0; background: #0F172A; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0F172A; z-index: 9999;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(99,102,241,.25);
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    #loading p { color: rgba(255,255,255,.5); margin-top: 16px; font-family: sans-serif; font-size: 13px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Splash shown while Flutter initialises -->
<div id="loading">
  <div class="spinner"></div>
  <p>Loading…</p>
</div>

<script>
  // Hide the splash once Flutter has painted its first frame.
  window.addEventListener('flutter-first-frame', function () {
    var el = document.getElementById('loading');
    if (el) el.style.display = 'none';
  });
</script>

<!-- Agora Iris – loaded async so it never blocks Flutter bootstrap -->
<script async src="https://download.agora.io/sdk/release/iris-web-rtc_n450_w4220_0.8.6.js"></script>

<!-- Flutter -->
<script src="flutter_bootstrap.js"></script>

</body>
</html>
